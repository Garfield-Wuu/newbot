#!/usr/bin/env python
 #  -*-coding:utf8 -*-
PACKAGE = "base_control"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

#修改之后要重新编译

#轮子转5圈，用皮尺测量距离
#71cm=710mm,710/5=142mm --2024.7.5
gen.add("wheel_circumference_mm", int_t,    0, "An Integer parameter", 142,  0,  1000) #轮子周长mm


#两个轮子正反转5圈，然后除以5
#第1次: 7152  7165  -7152  -7154
#第2次: 7149  7161  -7154  -7165
#平均等于7156.5/5=1431 --2024.7.5
gen.add("pulses_per_wheel_turn_around",    int_t,    0, "An Integer parameter", 1431,  0, 10000) #轮子转一圈的脉冲数

#打开雷达（正常测导航的时候雷达是打开的，加上雷达抖动的影响），放在地面上，逆转5圈，顺转5圈
#逆:-11546 11545    -11543 11542
#顺:11549 -11549    11546 -11552
#平均等于11546.5/5=2309 --2024.7.5
gen.add("pulses_per_robot_turn_around",    int_t,    0, "An Integer parameter", 2309,  0, 10000) # #机器人转360度的脉冲数

gen.add("max_pwm",              int_t,    0, "An Integer parameter", 6400,  0, 10000)
gen.add("pid_p",                int_t,    0, "An Integer parameter", 50,  0,  200)
gen.add("pid_i",                int_t,    0, "An Integer parameter", 20,  0,  200)
gen.add("pid_d",                int_t,    0, "An Integer parameter", 20,  0,  200)

exit(gen.generate(PACKAGE, "base_control", "Base"))

